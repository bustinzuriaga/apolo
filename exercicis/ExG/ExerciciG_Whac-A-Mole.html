<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Whac A Mole</title>

</head>

<body>

	<style>
		body {
			background-color: #378d28;
			color: black;
			font-size: 50px;
			font-family: fantasy;
		}

		.grid {
			display: grid;
			grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
		}

		.topos {
			display: grid;
			grid-template-columns: 1fr 1fr 1fr;
			grid-template-areas:
				"titol . puntuacio"
				". casillas .";
			
            text-align: center;
		}

		#titol {
			grid-area: titol;
            background-color: greenyellow;
            box-shadow: 10px 10px 10px black;
            border-radius: 50px;
		}

		#casillas {
			grid-area: casillas;
		}

		#puntuacio {
			grid-area: puntuacio;
            background-color: greenyellow;
            box-shadow: 10px 10px 10px black;
            border-radius: 50px;
		}

        img {
        cursor: pointer;
        transition: transform 0.1s, filter 0.2s;
        }

        img:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        img:active {
            transform: scale(0.9);
        }

        #casillas img {
            width: 150px;
            height: 150px;
            object-fit: cover;
        }

	</style>

    <div class="topos">
        <p id="titol">Wach A Mole</p>
        <div id="casillas" class="grid">
            <img id="topo1" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo2" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo3" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo4" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo5" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo6" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo7" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo8" onclick="golpe(this)" src="recursos/topoNo.jpg">
            <img id="topo9" onclick="golpe(this)" src="recursos/topoNo.jpg">
        </div>
        <p id="puntuacio">Puntuació: 0</p>
    </div>

<script>

let puntuacio = 0;

let topoActualT1 = null;
let topoActualT2 = null;
let topoActualT3 = null;

let topoFueraT1 = false;
let topoFueraT2 = false;
let topoFueraT3 = false;

// NUEVO: bomba
let bombaActual = null;

setInterval(topoSale, 1000);

function topoSale(){

    for(let i = 1; i <= 9; i++){
        document.getElementById("topo"+i).src = "recursos/topoNo.jpg";
    }

    let casillasOcupadas = [];

    // Topo 1
    let aleatoriT1 = Math.floor(Math.random() * 2);
    if (aleatoriT1 == 1) {
        let casillaT1 = Math.floor(Math.random() * 9) + 1;
        topoActualT1 = document.getElementById("topo"+casillaT1);
        topoActualT1.src = "recursos/topoSi.jpg";
        topoFueraT1 = true;
        casillasOcupadas.push(casillaT1);
    } else {
        topoActualT1 = null;
        topoFueraT1 = false;
    }

    // Topo 2
    let aleatoriT2 = Math.floor(Math.random() * 2);
    if (aleatoriT2 == 1) {
        let casillaT2 = Math.floor(Math.random() * 9) + 1;
        topoActualT2 = document.getElementById("topo"+casillaT2);
        topoActualT2.src = "recursos/topoSi.jpg";
        topoFueraT2 = true;
        casillasOcupadas.push(casillaT2);
    } else {
        topoActualT2 = null;
        topoFueraT2 = false;
    }

    // Topo 3
    let aleatoriT3 = Math.floor(Math.random() * 2);
    if (aleatoriT3 == 1) {
        let casillaT3 = Math.floor(Math.random() * 9) + 1;
        topoActualT3 = document.getElementById("topo"+casillaT3);
        topoActualT3.src = "recursos/topoSi.jpg";
        topoFueraT3 = true;
        casillasOcupadas.push(casillaT3);
    } else {
        topoActualT3 = null;
        topoFueraT3 = false;
    }

    // Bomba (apareix una bomba, al fer click reseteja la puntuació a 0)
    let ponerBomba = Math.floor(Math.random() * 2);

    if (ponerBomba == 1) {

        let casillaBomba;

        do {
            casillaBomba = Math.floor(Math.random() * 9) + 1;
        } while (casillasOcupadas.includes(casillaBomba));

        bombaActual = document.getElementById("topo"+casillaBomba);
        bombaActual.src = "recursos/bomba.png";

    } else {
        bombaActual = null;
    }
}

function golpe(topo){

    if (topo == bombaActual) {
        topo.src = "recursos/bomba.png";
        puntuacio = 0;
        document.getElementById("puntuacio").innerHTML = "Puntuació: " + puntuacio;
        var audio = new Audio('recursos/boing.mp3');
        audio.play();
        return;
    }

    topo.src = "recursos/topoPam.jpg";

    if ((topo == topoActualT1 && topoFueraT1) || 
        (topo == topoActualT2 && topoFueraT2) || 
        (topo == topoActualT3 && topoFueraT3)) {
        
        puntuacio++;
        document.getElementById("puntuacio").innerHTML = "Puntuació: " + puntuacio;

        var audio = new Audio('recursos/boing.mp3');
        audio.play();

        if (topo == topoActualT1) topoFueraT1 = false;
        if (topo == topoActualT2) topoFueraT2 = false;
        if (topo == topoActualT3) topoFueraT3 = false;
    }
}

</script>

</body>
</html>
